name: Deploy Qualia-DB Playground to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-pages-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-pages-

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends gzip curl

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked --version 0.13.1

      - name: Build WASM (qualia-core-db)
        run: |
          wasm-pack build crates/qualia-core-db \
            --target web \
            --release \
            --out-dir ../../docs/playground \
            --out-name qualia_core_db \
            --no-typescript

      - name: Build WordNet dataset (100 k-triple subset for Pages demo)
        continue-on-error: true   # non-fatal: Pages deploys fine without WordNet data
        run: bash scripts/fetch_wordnet.sh --subset 100000

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build Rust documentation
        run: cargo doc --no-deps -p qualia-core-db -p qualia-cli -p qualia-client-core

      - name: Stage Rust docs into Jekyll source
        run: cp -r target/doc docs/rustdoc

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
