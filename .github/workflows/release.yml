name: Cross-Platform Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ── Job 1: qualia-cli ─────────────────────────────────────────────────────────
jobs:
  build-cli:
    name: CLI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: target/release/qualia-cli
            asset_name: qualia-cli-linux-x86_64
          - os: windows-latest
            artifact: target/release/qualia-cli.exe
            asset_name: qualia-cli-windows-x86_64.exe
          - os: macos-14
            artifact: target/release/qualia-cli
            asset_name: qualia-cli-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cli-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-cli-

      - name: Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Build qualia-cli
        run: cargo build --release -p qualia-cli

      - name: Rename artifact
        shell: bash
        run: cp ${{ matrix.artifact }} ${{ matrix.asset_name }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DirectML.dll (Windows CLI)
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: vendor/directml/bin/x64-win/DirectML.dll
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ── Job 2: qualia-desktop ───────────────────────────────────────────────────
  build-desktop:
    name: Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: qualia-desktop
            asset_name: qualia-desktop-windows-setup.exe
          - os: macos-14
            artifact: qualia-desktop
            asset_name: qualia-desktop-macos.dmg
          - os: ubuntu-22.04
            artifact: qualia-desktop
            asset_name: qualia-desktop-linux.AppImage

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --version 0.6.0-alpha.2

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev build-essential curl wget file libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Build Mindware Studio application
        run: |
          cd crates/qualia-studio
          dx build --release
          cd ../qualia-desktop
          cargo tauri build

      - name: Upload Windows installer
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: crates/qualia-desktop/target/release/bundle/msi/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS disk image
        if: matrix.os == 'macos-14'
        uses: softprops/action-gh-release@v2
        with:
          files: crates/qualia-desktop/target/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux AppImage
        if: matrix.os == 'ubuntu-22.04'
        uses: softprops/action-gh-release@v2
        with:
          files: crates/qualia-desktop/target/release/bundle/appimage/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ── Job 3: qualia-core-db WASM ────────────────────────────────────────────────
  build-wasm:
    name: WASM (qualia-core-db)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: wasm-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: wasm-cargo-

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked --version 0.13.1 --force

      - name: Build WASM package
        run: |
          wasm-pack build crates/qualia-core-db \
            --target web \
            --release \
            --out-dir ../../docs/playground \
            --out-name qualia_core_db \
            --no-typescript

      - name: Package WASM artifacts (GitHub Pages compatible)
        run: |
          mkdir -p release-assets/qualia-core-wasm
          cp docs/playground/qualia_core_db.js release-assets/qualia-core-wasm/
          cp docs/playground/qualia_core_db_bg.wasm release-assets/qualia-core-wasm/
          tar -czf qualia-core-wasm-pages.tar.gz -C release-assets qualia-core-wasm

      - name: Package WASM artifacts (raw wasm-pack pkg)
        run: tar -czf qualia-core-wasm.tar.gz -C docs/playground qualia_core_db.js qualia_core_db_bg.wasm

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            qualia-core-wasm.tar.gz
            qualia-core-wasm-pages.tar.gz
            docs/playground/qualia_core_db.js
            docs/playground/qualia_core_db_bg.wasm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# Flutter desktop packaging moved to WebizenAI repo — see Local_LIbraries/EXPORTS/qualia-flutter-desktop/
