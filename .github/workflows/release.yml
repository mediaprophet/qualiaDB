name: Cross-Platform Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false   # let other platforms finish even if one fails
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # Tauri v1 on Linux requires WebKit2GTK 4.0 (not 4.1 which is for Tauri v2)
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            build-essential \
            libssl-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Build qualia-cli
        run: cargo build --release -p qualia-cli

      - name: Build qualia-desktop
        run: cargo build --release -p qualia-desktop

      # softprops will silently skip files that don't exist on a given platform
      # (e.g. .exe won't exist on Linux/macOS, bare binary won't exist on Windows)
      - name: Upload release artefacts
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            target/release/qualia-cli
            target/release/qualia-cli.exe
            target/release/qualia-desktop
            target/release/qualia-desktop.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
