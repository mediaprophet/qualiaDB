name: Cross-Platform Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ── Job 1: qualia-cli ─────────────────────────────────────────────────────────
jobs:
  build-cli:
    name: CLI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: target/release/qualia-cli
            asset_name: qualia-cli-linux-x86_64
          - os: windows-latest
            artifact: target/release/qualia-cli.exe
            asset_name: qualia-cli-windows-x86_64.exe
          - os: macos-14
            artifact: target/release/qualia-cli
            asset_name: qualia-cli-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cli-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-cli-

      - name: Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Build qualia-cli
        run: cargo build --release -p qualia-cli

      - name: Rename artifact
        shell: bash
        run: cp ${{ matrix.artifact }} ${{ matrix.asset_name }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DirectML.dll (Windows CLI)
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: vendor/directml/bin/x64-win/DirectML.dll
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ── Job 2: qualia-core-db WASM ────────────────────────────────────────────────
  build-wasm:
    name: WASM (qualia-core-db)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: wasm-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: wasm-cargo-

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM package
        run: |
          wasm-pack build crates/qualia-core-db \
            --target web \
            --release \
            --out-dir ../../docs/playground \
            --out-name qualia_core_db \
            --no-typescript

      - name: Package WASM artifacts (GitHub Pages compatible)
        run: |
          mkdir -p release-assets/qualia-core-wasm
          cp docs/playground/qualia_core_db.js release-assets/qualia-core-wasm/
          cp docs/playground/qualia_core_db_bg.wasm release-assets/qualia-core-wasm/
          tar -czf qualia-core-wasm-pages.tar.gz -C release-assets qualia-core-wasm

      - name: Package WASM artifacts (raw wasm-pack pkg)
        run: tar -czf qualia-core-wasm.tar.gz -C docs/playground qualia_core_db.js qualia_core_db_bg.wasm

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            qualia-core-wasm.tar.gz
            qualia-core-wasm-pages.tar.gz
            docs/playground/qualia_core_db.js
            docs/playground/qualia_core_db_bg.wasm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ── Job 3: Flutter desktop — Windows x64 installer + portable zip ─────────────
  build-flutter-windows:
    name: Flutter Windows x64 (installer)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-flutter-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-flutter-

      - name: Install NuGet + Inno Setup
        run: |
          choco install nuget.commandline innosetup -y --no-progress

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Package portable bundle (Flutter + Rust FFI + DirectML)
        shell: pwsh
        run: .\scripts\package-flutter-windows.ps1

      - name: Build Inno Setup installer
        shell: pwsh
        env:
          APP_VERSION: ${{ github.ref_name }}
        run: |
          $v = $env:APP_VERSION -replace '^v',''
          .\scripts\installer\build-windows-installer.ps1 -AppVersion $v

      - name: Create portable zip
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\qualia-flutter-windows-x64\*" `
            -DestinationPath "qualia-flutter-windows-x64.zip" -Force

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/QualiaDB-Setup-*-x64.exe
            qualia-flutter-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ── Job 4: Flutter desktop — macOS Apple Silicon (.dmg) ───────────────────────
  build-flutter-macos:
    name: Flutter macOS arm64 (DMG)
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-flutter-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-cargo-flutter-

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Package .app bundle
        run: |
          chmod +x scripts/package-flutter-macos.sh scripts/installer/build-macos-dmg.sh
          ./scripts/package-flutter-macos.sh

      - name: Build DMG installer
        env:
          APP_VERSION: ${{ github.ref_name }}
        run: |
          export APP_VERSION="${APP_VERSION#v}"
          ./scripts/installer/build-macos-dmg.sh

      - name: Create portable tar.gz
        run: |
          tar -czf qualia-flutter-macos-arm64.tar.gz \
            -C dist/qualia-flutter-macos-arm64 qualia_flutter.app

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/QualiaDB-*-macos-arm64.dmg
            qualia-flutter-macos-arm64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ── Job 5: Flutter desktop — Linux x64 (.deb + portable tar.gz) ───────────────
  build-flutter-linux:
    name: Flutter Linux x64 (deb)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-flutter-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-flutter-

      - name: Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libblkid-dev liblzma-dev ninja-build \
            libssl-dev pkg-config clang cmake libsecret-1-dev libjsoncpp-dev \
            dpkg-dev

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Package portable bundle
        run: |
          chmod +x scripts/package-flutter-linux.sh scripts/installer/build-linux-deb.sh
          ./scripts/package-flutter-linux.sh

      - name: Build .deb installer
        env:
          APP_VERSION: ${{ github.ref_name }}
        run: |
          export APP_VERSION="${APP_VERSION#v}"
          ./scripts/installer/build-linux-deb.sh

      - name: Create portable tar.gz
        run: |
          tar -czf qualia-flutter-linux-x64.tar.gz \
            -C dist/qualia-flutter-linux-x64 .

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/QualiaDB-*-linux-x64.deb
            qualia-flutter-linux-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ── Job 6: Updater manifest (latest.json) ─────────────────────────────────────
  publish-updater-manifest:
    name: Publish latest.json
    needs:
      - build-flutter-windows
      - build-flutter-macos
      - build-flutter-linux
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Generate latest.json
        env:
          APP_VERSION: ${{ github.ref_name }}
        run: |
          chmod +x scripts/installer/generate-latest-json.sh
          VERSION="${APP_VERSION#v}"
          ./scripts/installer/generate-latest-json.sh "$VERSION" latest.json

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
