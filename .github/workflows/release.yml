name: Universal Cross-Platform Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-desktop-cli:
    name: Build & Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        
      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
          
      - name: Build Qualia CLI
        run: cargo build --release -p qualia-cli
        
      - name: Build Qualia Desktop (Tauri)
        run: |
          cargo install tauri-cli --version "^2.0.0" || true
          cargo tauri build
          
      - name: Upload Release Artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/qualia-cli*
            crates/qualia-desktop/src-tauri/target/release/bundle/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Install Rust toolchain with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android
          
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0" || true
        
      - name: Build Android APK (Tauri)
        run: |
          cargo tauri android init || true
          cargo tauri android build --apk
          
      - name: Upload Android Release Artifact
        uses: softprops/action-gh-release@v2
        with:
          files: |
            crates/qualia-desktop/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
