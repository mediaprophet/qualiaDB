name: Cross-Platform Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-14]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            build-essential \
            libssl-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Build qualia-cli
        run: cargo build --release -p qualia-cli

      - name: Install Frontend Dependencies
        working-directory: ./crates/qualia-client
        run: npm install

      - name: Build Frontend
        working-directory: ./crates/qualia-client
        run: npm run build

      - name: Build Tauri App (Installers)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./crates/qualia-desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'QualiaDB ${{ github.ref_name }}'
          releaseBody: 'See the assets to download this version and install.'

      - name: Upload CLI artefact
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            target/release/qualia-cli
            target/release/qualia-cli.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
