name: Comparative Benchmarks

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 3 * * 1'   # Weekly on Monday at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write   # needed to commit results back to the repo

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-bench-

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends curl

      - name: Install Python benchmark dependencies
        run: pip install --quiet -r benchmarks/requirements.txt

      # ── RAM ceiling gate (gate: must pass before any bench runs) ─────────────
      - name: RAM Footprint Validator (512 MB ceiling gate)
        run: cargo bench --package qualia-core-db --bench ram_usage

      # ── Oxigraph ─────────────────────────────────────────────────────────────
      - name: Run Oxigraph benchmark (10 k triples)
        run: |
          python benchmarks/harness.py \
            --engine oxigraph \
            --n 10000 \
            --output docs/comparative_benchmark_results.json

      # ── SurrealDB ─────────────────────────────────────────────────────────────
      - name: Install SurrealDB
        run: |
          curl -sSf https://install.surrealdb.com | sh
          echo "$HOME/.surrealdb" >> $GITHUB_PATH

      - name: Run SurrealDB benchmark (10 k triples)
        run: |
          python benchmarks/harness.py \
            --engine surrealdb \
            --n 10000 \
            --output docs/comparative_benchmark_results.json

      # ── Comunica (SPARQL JS engine) ───────────────────────────────────────────
      - name: Install Comunica Node.js dependencies
        run: cd benchmarks/comunica && npm install --prefer-offline

      - name: Run Comunica benchmark (10 k triples)
        run: |
          python benchmarks/harness.py \
            --engine comunica \
            --n 10000 \
            --output docs/comparative_benchmark_results.json

      # ── WASM-Prolog (tau-prolog) ──────────────────────────────────────────────
      - name: Install WASM-Prolog Node.js dependencies
        run: cd benchmarks/wasm_prolog && npm install --prefer-offline

      - name: Run WASM-Prolog benchmark (10 k triples)
        run: |
          python benchmarks/harness.py \
            --engine wasm_prolog \
            --n 10000 \
            --output docs/comparative_benchmark_results.json

      # ── Qualia WASM (core-db) ─────────────────────────────────────────────────
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build Qualia WASM for comparative harness
        run: |
          rustup target add wasm32-unknown-unknown
          wasm-pack build crates/qualia-core-db \
            --target web \
            --release \
            --out-dir docs/playground \
            --out-name qualia_core_db \
            --no-typescript

      - name: Run Qualia WASM benchmark (10 k triples)
        run: |
          python benchmarks/harness.py \
            --engine qualia_wasm \
            --n 10000 \
            --output docs/comparative_benchmark_results.json

      # ── Qualia Native ─────────────────────────────────────────────────────────
      - name: Build Qualia CLI (release)
        run: cargo build --release -p qualia-cli

      - name: Run native Qualia bench suite (ingestion + latency)
        run: cargo run --release -p qualia-cli -- bench --suite full
        # Output written to docs/llm_benchmark_results.json by the CLI

      - name: Start Qualia daemon (background)
        run: |
          cargo run --release -p qualia-cli -- daemon --dev --port 4242 &
          echo "Waiting for daemon to be healthy…"
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:4242/health && echo "Daemon ready." && break
            sleep 2
          done

      - name: Ingest benchmark dataset into Qualia
        run: |
          python - <<'EOF'
          import sys
          sys.path.insert(0, 'benchmarks')
          from common import generate_ntriples
          with open('/tmp/bench_10k.nt', 'wb') as f:
              f.write(generate_ntriples(10000))
          EOF
          cargo run --release -p qualia-cli -- ingest /tmp/bench_10k.nt || true

      - name: Run Qualia benchmark (10 k triples)
        run: |
          python benchmarks/harness.py \
            --engine qualia \
            --n 10000 \
            --output docs/comparative_benchmark_results.json

      # ── Persist results to the repo (so Pages picks them up) ──────────────────
      - name: Commit benchmark results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/comparative_benchmark_results.json docs/llm_benchmark_results.json
          git diff --cached --quiet \
            || git commit -m "chore: update benchmark results [skip ci]"
          git push

      - name: Upload comparative results artifact
        uses: actions/upload-artifact@v4
        with:
          name: comparative-benchmark-results
          path: docs/comparative_benchmark_results.json
          retention-days: 30

      - name: Upload LLM benchmark results artifact
        uses: actions/upload-artifact@v4
        with:
          name: llm-benchmark-results
          path: docs/llm_benchmark_results.json
          retention-days: 30

  benchmark-schemaorg:
    runs-on: ubuntu-latest
    needs: benchmark

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-bench-

      - name: Install Python benchmark dependencies
        run: pip install --quiet -r benchmarks/requirements.txt

      - name: Install Comunica and WASM-Prolog Node dependencies
        run: |
          cd benchmarks/comunica && npm install --prefer-offline
          cd ../wasm_prolog && npm install --prefer-offline

      - name: Install wasm-pack and build Qualia WASM
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          rustup target add wasm32-unknown-unknown
          wasm-pack build crates/qualia-core-db \
            --target web \
            --release \
            --out-dir docs/playground \
            --out-name qualia_core_db \
            --no-typescript

      - name: Install SurrealDB
        run: |
          curl -sSf https://install.surrealdb.com | sh
          echo "$HOME/.surrealdb" >> $GITHUB_PATH

      - name: Build Qualia CLI and q42_comparative_bench
        run: cargo build --release -p qualia-cli

      - name: Prepare Schema.org NT + q42 + c.q42 artifacts
        run: bash scripts/prepare_schemaorg_benchmark.sh 30.0 current-https

      - name: Run Schema.org comparative harness (all engines)
        run: |
          python benchmarks/harness.py \
            --all \
            --no-qualia \
            --dataset-profile schemaorg-30-current-https \
            --output docs/comparative_benchmark_results.schemaorg-30-current-https.json

      - name: Commit Schema.org benchmark results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/comparative_benchmark_results.schemaorg-30-current-https.json
          git diff --cached --quiet \
            || git commit -m "chore: update Schema.org comparative benchmark results [skip ci]"
          git push

      - name: Upload Schema.org comparative results artifact
        uses: actions/upload-artifact@v4
        with:
          name: comparative-benchmark-results-schemaorg
          path: docs/comparative_benchmark_results.schemaorg-30-current-https.json
          retention-days: 30
