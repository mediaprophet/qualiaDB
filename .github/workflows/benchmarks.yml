name: QualiaDB LLM Benchmarks

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Cargo dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-

    - name: Run RAM Footprint Validator (512 MB ceiling gate)
      run: cargo bench --package qualia-core-db --bench ram_usage

    - name: Run Native LLM Benchmarks
      run: cargo run --release -p qualia-cli -- bench --suite full

    - name: Upload Qualia JSON Telemetry Artifact
      uses: actions/upload-artifact@v4
      with:
        name: llm-benchmark-results
        path: docs/llm_benchmark_results.json
        retention-days: 30

    # ── Comparative benchmark: Oxigraph (live, isolated, 512 MB ceiling) ─────
    - name: Install Python benchmark dependencies
      run: pip install --quiet -r benchmarks/requirements.txt

    - name: Run Oxigraph comparative benchmark (10k triples)
      run: |
        python benchmarks/harness.py \
          --engine oxigraph \
          --n 10000 \
          --output docs/comparative_benchmark_results.json

    - name: Run Oxigraph comparative benchmark (100k triples — ceiling stress)
      run: |
        python benchmarks/harness.py \
          --engine oxigraph \
          --n 100000 \
          --output docs/comparative_benchmark_results.json

    - name: Upload Comparative Benchmark Results
      uses: actions/upload-artifact@v4
      with:
        name: comparative-benchmark-results
        path: docs/comparative_benchmark_results.json
        retention-days: 30
