<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spatial • Qualia-DB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .glass-strong { background: rgba(255, 255, 255, 0.06); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.12); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <!-- Unified Navigation -->
    <nav class="sticky top-0 z-50 border-b border-white/10 bg-zinc-950/95 backdrop-blur-2xl">
        <div class="max-w-screen-2xl mx-auto px-8 py-3 flex items-center justify-between">
            <div class="flex items-center gap-x-8">
                <a href="cooperative.html" class="flex items-center gap-x-3">
                    <div class="w-8 h-8 rounded-2xl bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center">
                        <i class="fa-solid fa-users text-white text-lg"></i>
                    </div>
                    <span class="font-display text-xl font-semibold tracking-tighter">Cooperative Projects</span>
                </a>
                <div class="hidden md:flex items-center gap-x-6 text-sm">
                    <a href="cooperative.html" class="hover:text-white/80">Hub</a>
                    <a href="project-detail.html" class="hover:text-white/80">Project</a>
                    <a href="kanban.html" class="hover:text-white/80">Kanban</a>
                    <a href="roadmap.html" class="hover:text-white/80">Roadmap</a>
                    <a href="benchmark.html" class="hover:text-white/80">Benchmark</a>
                </div>
            </div>
            <div class="flex items-center gap-x-3 text-sm">
                <a href="contribute.html" class="px-4 py-1.5 hover:bg-white/5 rounded-2xl">Contribute</a>
                <a href="economics.html" class="px-4 py-1.5 hover:bg-white/5 rounded-2xl">Economics</a>
                <a href="canvases.html" class="px-4 py-1.5 hover:bg-white/5 rounded-2xl">Canvases</a>
            </div>
        </div>
    </nav>

    <div class="max-w-screen-2xl mx-auto px-8 pt-8">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="font-display text-3xl font-semibold">Spatial Mathematics & CGAL</h1>
                <p class="text-white/60">Encoding 3D geometries directly into native 48-byte .q42 ledgers</p>
            </div>
            <button onclick="generateNewGeometry()" class="px-5 py-2 bg-pink-600 hover:bg-pink-500 rounded-2xl text-sm font-semibold flex items-center gap-x-2">
                <i class="fa-solid fa-sync"></i>
                <span>Generate New Mesh</span>
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- 3D Viewer -->
            <div class="lg:col-span-2 glass-strong rounded-3xl overflow-hidden" style="height: 520px;" id="canvas-container"></div>

            <!-- Hex Dump / Info -->
            <div class="glass-strong rounded-3xl p-6">
                <div class="font-semibold mb-3 flex items-center gap-x-2">
                    <i class="fa-solid fa-microchip"></i>
                    <span>.q42 Binary Encoding</span>
                </div>
                <pre id="hexdump" class="text-xs font-mono bg-black/60 p-4 rounded-2xl overflow-auto h-[420px] text-emerald-400"></pre>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(70, container.clientWidth / container.clientHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambient);
        const light = new THREE.PointLight(0xff266e, 1.5, 200);
        light.position.set(10, 20, 10);
        scene.add(light);

        let meshGroup = new THREE.Group();
        scene.add(meshGroup);
        camera.position.set(0, 8, 18);

        function generateNewGeometry() {
            while (meshGroup.children.length > 0) meshGroup.remove(meshGroup.children[0]);

            const geo = new THREE.IcosahedronGeometry(7, 2);
            const wire = new THREE.LineSegments(new THREE.WireframeGeometry(geo), new THREE.LineBasicMaterial({ color: 0x00f0ff, transparent: true, opacity: 0.4 }));
            const points = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0xff266e, size: 0.18 }));

            meshGroup.add(wire);
            meshGroup.add(points);

            document.getElementById('hexdump').textContent = 
`Q42 Spatial Encoding
Vertices: ${geo.attributes.position.count}
Triangles: ${geo.index ? geo.index.count / 3 : 'N/A'}
Memory: ~${(geo.attributes.position.count * 48 / 1024).toFixed(1)} KB

[48-byte Quin layout]
S P O C M Parity
... (simulated dump)`;
        }

        function animate() {
            requestAnimationFrame(animate);
            meshGroup.rotation.y += 0.003;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        generateNewGeometry();
        animate();
    </script>
</body>
</html>
