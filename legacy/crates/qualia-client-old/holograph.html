<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Biometric Holograph</title>
    <style>
        :root {
            --bg-dark: #020202;
            --neon-blue: #00f0ff;
            --neon-purple: #b026ff;
            --glass-bg: rgba(20, 20, 25, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; padding: 0;
            background: var(--bg-dark);
            color: #fff; font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden; /* Canvas takes over */
        }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; padding: 20px; box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        header {
            pointer-events: auto; display: flex; justify-content: space-between;
            align-items: center;
        }
        
        h1 {
            font-size: 2rem; margin: 0;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; letter-spacing: 2px;
        }

        .back-btn {
            color: var(--neon-blue); text-decoration: none; font-weight: bold;
            border: 1px solid var(--neon-blue); padding: 8px 16px; border-radius: 4px;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
            transition: 0.3s;
        }
        .back-btn:hover { background: rgba(0, 240, 255, 0.2); }

        .telemetry-hud {
            pointer-events: auto;
            background: var(--glass-bg); backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: 12px;
            padding: 1.5rem; width: 300px;
            align-self: flex-start;
        }

        .hud-row {
            display: flex; justify-content: space-between; margin-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px;
            font-family: monospace;
        }
        .hud-val { font-weight: bold; }
        .val-heart { color: #ff3366; }
        .val-emotion { color: var(--neon-blue); }
        .val-tensor { color: #00ff88; }
        
        #canvas-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }
    </style>
    <!-- Include Three.js via CDN for Browser rendering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <header>
            <h1>Biometric Holograph</h1>
            <a href="index.html" class="back-btn">← Terminate Session</a>
        </header>

        <div class="telemetry-hud">
            <h3 style="margin-top:0; border-bottom:1px solid #444; padding-bottom:10px; color:#aaa;">Real-Time Biosignals</h3>
            <div class="hud-row"><span>Heart Rate:</span> <span class="hud-val val-heart" id="hudHr">72 BPM</span></div>
            <div class="hud-row"><span>Valence:</span> <span class="hud-val val-emotion" id="hudValence">+0.68</span></div>
            <div class="hud-row"><span>Arousal:</span> <span class="hud-val val-emotion" id="hudArousal">0.42</span></div>
            <div class="hud-row" style="border:none;"><span>Sparse Nodes:</span> <span class="hud-val val-tensor" id="hudNodes">1,024</span></div>
        </div>
    </div>

    <script src="src/holograph.js"></script>
</body>
</html>
