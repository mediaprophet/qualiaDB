sparql_endpoints:
  - id: "wikidata-main"
    name: "Wikidata Query Service"
    endpoint: "https://query.wikidata.org/sparql"
    gui: "https://query.wikidata.org/"
    maintainer: "Wikimedia Foundation"
    reliability: "high"
    domains: [general, entities, properties, knowledge-graph]
    rate_limit: "moderate"
    federation_supported: true
    example_queries:
      - description: "Find humans born in Sydney"
        query: |
          SELECT ?person ?personLabel WHERE {
            ?person wdt:P31 wd:Q5 .
            ?person wdt:P569 ?birthDate .
            ?person wdt:P19 wd:Q3130 .
            SERVICE wikibase:label { bd:serviceParam wikibase:language "[AUTO_LANGUAGE],en". }
          }
          LIMIT 50
    last_verified: "2026-06-06"
    notes: "Primary public knowledge graph. Excellent for entity enrichment and federation."

  - id: "dbpedia-main"
    name: "DBpedia"
    endpoint: "https://dbpedia.org/sparql"
    maintainer: "DBpedia Association / OpenLink"
    reliability: "medium-high"
    domains: [general, wikipedia-derived]
    rate_limit: "moderate"
    federation_supported: true
    last_verified: "2026-06-05"
    notes: "Long-standing public endpoint extracted from Wikipedia."

  - id: "eu-open-data"
    name: "EU Open Data Portal SPARQL"
    endpoint: "https://data.europa.eu/sparql"
    maintainer: "Publications Office of the European Union"
    reliability: "high"
    domains: [government, open-data, eu]
    rate_limit: "unknown"
    last_verified: "2026-06-05"