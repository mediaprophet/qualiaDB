[package]
name = "qualia-desktop"
version = "0.0.1-dev"
edition = "2021"

[build-dependencies]
tauri-build = { version = "1.5", features = [] }

[dependencies]
tauri = { version = "1.5", features = [ "protocol-asset", "os-all", "updater"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sysinfo = "0.30"

[features]
custom-protocol = ["tauri/custom-protocol"]
