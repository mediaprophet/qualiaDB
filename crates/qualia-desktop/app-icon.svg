<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    Qualia-DB App Icon  —  "The 5-Vector Quin"
    Five outer nodes (Subject, Predicate, Object, Context, Metadata) arranged
    in a pentagon, each connected to the central Sentinel VM hub.
    Pentagon ring shows the graph is fully connected.  Bullseye center node
    represents the device as the sovereign heart of the digital self.
  -->
  <defs>
    <radialGradient id="rg-bg" cx="50%" cy="38%" r="65%">
      <stop offset="0%"   stop-color="#172554"/>
      <stop offset="100%" stop-color="#060c1c"/>
    </radialGradient>
    <radialGradient id="rg-center-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#38bdf8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="f-soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="f-node" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <!-- Background: rounded square, dark navy -->
  <rect width="1024" height="1024" rx="196" fill="url(#rg-bg)"/>

  <!-- Ambient center glow -->
  <circle cx="512" cy="512" r="320" fill="url(#rg-center-glow)"/>

  <!-- ── Pentagon vertices (r=334, top at top) ─────────────────────────────
       V0  (512, 178)   — top    — Subject
       V1  (830, 409)   — NE     — Predicate
       V2  (706, 786)   — SE     — Object
       V3  (318, 786)   — SW     — Context
       V4  (194, 409)   — NW     — Metadata
  ──────────────────────────────────────────────────────────────────────── -->

  <!-- Blurred edge glow layer -->
  <g stroke="#38bdf8" stroke-width="32" stroke-linecap="round"
     opacity="0.22" filter="url(#f-soft)">
    <line x1="512" y1="512" x2="512" y2="178"/>
    <line x1="512" y1="512" x2="830" y2="409"/>
    <line x1="512" y1="512" x2="706" y2="786"/>
    <line x1="512" y1="512" x2="318" y2="786"/>
    <line x1="512" y1="512" x2="194" y2="409"/>
    <line x1="512" y1="178" x2="830" y2="409"/>
    <line x1="830" y1="409" x2="706" y2="786"/>
    <line x1="706" y1="786" x2="318" y2="786"/>
    <line x1="318" y1="786" x2="194" y2="409"/>
    <line x1="194" y1="409" x2="512" y2="178"/>
  </g>

  <!-- Crisp edges -->
  <g stroke="#38bdf8" stroke-width="20" stroke-linecap="round" opacity="0.72">
    <!-- Spokes (hub → outer nodes) -->
    <line x1="512" y1="512" x2="512" y2="178"/>
    <line x1="512" y1="512" x2="830" y2="409"/>
    <line x1="512" y1="512" x2="706" y2="786"/>
    <line x1="512" y1="512" x2="318" y2="786"/>
    <line x1="512" y1="512" x2="194" y2="409"/>
    <!-- Pentagon ring -->
    <line x1="512" y1="178" x2="830" y2="409"/>
    <line x1="830" y1="409" x2="706" y2="786"/>
    <line x1="706" y1="786" x2="318" y2="786"/>
    <line x1="318" y1="786" x2="194" y2="409"/>
    <line x1="194" y1="409" x2="512" y2="178"/>
  </g>

  <!-- Outer node glows -->
  <g fill="#38bdf8" opacity="0.28" filter="url(#f-node)">
    <circle cx="512" cy="178" r="82"/>
    <circle cx="830" cy="409" r="82"/>
    <circle cx="706" cy="786" r="82"/>
    <circle cx="318" cy="786" r="82"/>
    <circle cx="194" cy="409" r="82"/>
  </g>

  <!-- Outer nodes — filled cyan -->
  <g fill="#38bdf8">
    <circle cx="512" cy="178" r="54"/>
    <circle cx="830" cy="409" r="54"/>
    <circle cx="706" cy="786" r="54"/>
    <circle cx="318" cy="786" r="54"/>
    <circle cx="194" cy="409" r="54"/>
  </g>

  <!-- Outer node bright cores -->
  <g fill="white" opacity="0.88">
    <circle cx="512" cy="178" r="22"/>
    <circle cx="830" cy="409" r="22"/>
    <circle cx="706" cy="786" r="22"/>
    <circle cx="318" cy="786" r="22"/>
    <circle cx="194" cy="409" r="22"/>
  </g>

  <!-- Center hub glow -->
  <circle cx="512" cy="512" r="120" fill="#38bdf8" opacity="0.28" filter="url(#f-node)"/>

  <!-- Center hub: bullseye (outer ring → dark gap → inner dot) -->
  <circle cx="512" cy="512" r="88"  fill="#38bdf8"/>
  <circle cx="512" cy="512" r="56"  fill="#060c1c"/>
  <circle cx="512" cy="512" r="30"  fill="#38bdf8"/>
</svg>
