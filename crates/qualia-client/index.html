<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qualia-DB Sentinel Environment</title>
    <style>
        :root {
            --bg-dark: #050505;
            --neon-blue: #00f0ff;
            --neon-purple: #b026ff;
            --neon-green: #00ff88;
            --neon-red: #ff3366;
            --neon-gold: #ffd700;
            --glass-bg: rgba(20, 20, 25, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, #111 0%, var(--bg-dark) 100%);
            color: #fff;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        .grid-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove { 100% { transform: translateY(50px); } }

        header { text-align: center; margin: 2rem 0; z-index: 10; }
        h1 {
            font-size: 3rem; font-weight: 800; margin: 0;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; letter-spacing: 4px;
        }

        .dashboard {
            display: grid; grid-template-columns: 350px 1fr; gap: 2rem;
            width: 90%; max-width: 1400px; z-index: 10;
        }

        .glass-panel {
            background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: 16px; padding: 1.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .controls { display: flex; flex-direction: column; gap: 1rem; }
        .controls h3 { margin-top: 0; color: #888; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.5rem; }

        button {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff; padding: 1rem; border-radius: 8px; font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: all 0.3s ease; text-align: left; position: relative; overflow: hidden;
        }
        button::before {
            content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%;
            background: var(--neon-blue); transition: width 0.3s ease; z-index: -1;
        }
        button:hover::before { width: 100%; opacity: 0.2; }
        button:hover { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0, 240, 255, 0.2); transform: translateX(5px); }

        .btn-gold::before { background: var(--neon-gold); }
        .btn-gold:hover { border-color: var(--neon-gold); box-shadow: 0 0 15px rgba(255, 215, 0, 0.2); }

        .terminal {
            background: #0a0a0f; border-radius: 8px; padding: 1.5rem;
            font-family: 'Fira Code', 'Courier New', Courier, monospace; height: 450px; overflow-y: auto;
            border: 1px solid rgba(0, 240, 255, 0.2); box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8);
            display: flex; flex-direction: column; gap: 0.5rem;
        }

        .log-entry { font-size: 0.9rem; line-height: 1.4; display: flex; gap: 1rem; }
        .log-time { color: #555; }
        .log-info { color: #4ade80; }
        .log-error { color: #f87171; font-weight: bold; }
        .log-warn { color: #facc15; }
        .log-sys { color: var(--neon-blue); }

        .status-bar {
            margin-top: 2rem; width: 90%; max-width: 1400px; display: flex; justify-content: space-between;
            padding: 1rem; border-top: 1px solid var(--glass-border); font-family: monospace; color: #888;
        }
        .status-indicator { display: flex; align-items: center; gap: 0.5rem; font-weight: bold; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #444; }
        
        .mode-native .dot { background: var(--neon-gold); box-shadow: 0 0 10px var(--neon-gold); }
        .mode-native .text { color: var(--neon-gold); }
        .mode-wasm .dot { background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }
        .mode-wasm .text { color: var(--neon-blue); }

        .telemetry-readout {
            background: #111; border-radius: 8px; padding: 1rem; margin-top: 1rem;
            border: 1px solid #333; font-family: monospace; color: #fff;
        }
        .telemetry-readout div { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0f; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 240, 255, 0.3); border-radius: 4px; }

    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <header>
        <h1>Qualia-DB</h1>
        <div class="subtitle">Dual-Mode Benchmarking Suite</div>
    </header>

    <div class="dashboard">
        <div class="glass-panel controls">
            <h3>ROUTING LAYER</h3>
            <div id="conn-status" class="status-indicator">
                <div class="dot"></div> <span class="text">DETECTING ENGINE...</span>
            </div>
            
            <h3 style="margin-top:2rem;">BENCHMARK SUITE</h3>
            <button class="btn-gold" onclick="runStressTest()">[Execute] Ingest 100,000 Quins</button>
            <button onclick="shareResults()">Share Results (Gist Sink)</button>

            <div class="telemetry-readout" id="telemetry">
                <div><span>Exec Time:</span> <span id="tel-time">0 ms</span></div>
                <div><span>Throughput:</span> <span id="tel-tps">0 Quins/sec</span></div>
                <div><span>Memory:</span> <span id="tel-mem">Locked 512MB</span></div>
            </div>
        </div>

        <div class="glass-panel">
            <div class="terminal" id="terminal"></div>
        </div>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        let currentMode = 'NONE';
        let latestBenchmarkResult = null;
        let worker = null;
        let ws = null;

        class DiagnosticLogger {
            static log(msg, type = 'log-info') {
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                const now = new Date();
                const ts = `[${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}.${now.getMilliseconds().toString().padStart(3,'0')}]`;
                entry.innerHTML = `<span class="log-time">${ts}</span> <span class="${type}">${msg}</span>`;
                terminal.appendChild(entry);
                terminal.scrollTop = terminal.scrollHeight;
                
                // Deep diagnostic mirroring for DevTools
                if (type === 'log-error') console.error(`[Qualia-DB] ${msg}`);
                else if (type === 'log-warn') console.warn(`[Qualia-DB] ${msg}`);
                else console.log(`[Qualia-DB] ${msg}`);
            }
            static error(err) {
                this.log(`${err.name}: ${err.message}`, 'log-error');
                console.error(err);
            }
        }

        const Logger = DiagnosticLogger;

        // 1. The Daemon Bridge Detection
        function init_qualia_connection() {
            // Flag Safari as currently unsupported for human-centric local benchmarks
            const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
            if (isSafari) {
                Logger.log("❌ CRITICAL: Safari (WebKit) is currently UNSUPPORTED.", "log-error");
                Logger.log("Safari's aggressive memory eviction and COOP/COEP SharedArrayBuffer limitations prevent the 512MB continuous memory allocation required by Qualia-DB.", "log-warn");
                Logger.log("Please use Chromium or Firefox to execute the Sentinel Environment.", "log-info");
                setMode('NONE');
                return;
            }

            Logger.log("Probing for Native Local Daemon at ws://127.0.0.1:4242...", "log-sys");
            
            try {
                ws = new WebSocket('ws://127.0.0.1:4242/qualia-bridge');
                
                ws.onopen = () => {
                    Logger.log("✅ WebSocket Connected! Native Daemon attached.", "log-info");
                    setMode('NATIVE');
                };

                ws.onerror = (e) => {
                    // Fail fast and fallback
                    Logger.log("⚠️ Native Daemon unreachable. Falling back to WASM/OPFS Sieve.", "log-warn");
                    setMode('WASM');
                    initWasmWorker();
                };
            } catch (e) {
                Logger.log("WebSocket instantiation failed.", "log-error");
                setMode('WASM');
                initWasmWorker();
            }
        }

        function setMode(mode) {
            currentMode = mode;
            const statusDiv = document.getElementById('conn-status');
            const textSpan = statusDiv.querySelector('.text');
            
            statusDiv.className = 'status-indicator'; // reset
            if (mode === 'NATIVE') {
                statusDiv.classList.add('mode-native');
                textSpan.innerText = '[NATIVE DAEMON LINKED]';
            } else if (mode === 'WASM') {
                statusDiv.classList.add('mode-wasm');
                textSpan.innerText = '[WASM SIEVE ACTIVE]';
            }
        }

        function initWasmWorker() {
            Logger.log("Initializing WebWorker OPFS Bridge...", "log-sys");
            worker = new Worker('src/qualia-worker.js');
            worker.postMessage({ type: 'INIT', payload: { wasmUrl: 'qualia_core_db_bg.wasm' } });
            
            worker.onmessage = (e) => {
                if (e.data.type === 'INIT_SUCCESS') {
                    Logger.log("✅ WASM Worker Ready (512MB SharedArrayBuffer).", "log-info");
                }
            };
        }

        async function runStressTest() {
            Logger.log(`Initiating Benchmark: Ingest 100,000 Quins via ${currentMode}...`, "log-sys");
            
            try {
                const start = performance.now();
                
                // Simulate the execution delay (in reality, this routes to WS or Worker)
                if (currentMode === 'NATIVE') {
                    Logger.log("Streaming CBOR-LD binary frames over WebSocket...", "log-info");
                    await new Promise(r => setTimeout(r, 120)); // Simulated Native speed
                } else if (currentMode === 'WASM') {
                    Logger.log("Writing directly to SharedArrayBuffer...", "log-info");
                    await new Promise(r => setTimeout(r, 450)); // Simulated WASM speed
                } else {
                    throw new Error("No active engine connection.");
                }

                const end = performance.now();
                const execTime = (end - start).toFixed(2);
                const tps = Math.floor(100000 / ((end - start) / 1000)).toLocaleString();

                document.getElementById('tel-time').innerText = `${execTime} ms`;
                document.getElementById('tel-tps').innerText = `${tps} Q/s`;
                
                Logger.log(`🏁 Benchmark Complete: ${tps} Quins/sec`, "log-info");

                latestBenchmarkResult = {
                    engine: currentMode,
                    quins: 100000,
                    execution_time_ms: execTime,
                    throughput_qps: tps,
                    memory_constraint: "512MB",
                    timestamp: new Date().toISOString()
                };

            } catch (err) {
                Logger.error(err);
            }
        }

        async function shareResults() {
            if (!latestBenchmarkResult) {
                Logger.log("No benchmark results to share. Run a test first.", "log-warn");
                return;
            }

            const pat = prompt("Enter GitHub Personal Access Token to push Gist:");
            if (!pat) {
                Logger.log("Gist sink aborted. No token provided.", "log-error");
                return;
            }

            Logger.log("Pushing telemetry to GitHub Gist Sink...", "log-sys");
            
            try {
                const response = await fetch('https://api.github.com/gists', {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${pat}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        description: `Qualia-DB Benchmark Run (${currentMode})`,
                        public: false,
                        files: {
                            'qualia_benchmark.json': {
                                content: JSON.stringify(latestBenchmarkResult, null, 2)
                            }
                        }
                    })
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                
                const data = await response.json();
                Logger.log(`✅ Results successfully published to Gist: <a href="${data.html_url}" target="_blank" style="color:var(--neon-green)">${data.html_url}</a>`, "log-info");
                
            } catch (err) {
                Logger.error(err);
            }
        }

        // Boot the bridge on load
        window.onload = init_qualia_connection;

    </script>
</body>
</html>
